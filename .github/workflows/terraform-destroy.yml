name: 'Destroy Infrastructure'

on:
  workflow_dispatch: 

env:
  ARM_CLIENT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).appId }}
  ARM_CLIENT_SECRET: ${{ fromJSON(secrets.AZURE_CREDENTIALS).password }}
  ARM_TENANT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).tenant }}
  ARM_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}

jobs:
  destroy_production:
    name: 'Destroy Production'
    runs-on: ubuntu-latest
    environment: Production 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="key=prod.terraform.tfstate"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file="env/prod.tfvars"

  destroy_staging:
    name: 'Destroy Staging'
    runs-on: ubuntu-latest
    needs: destroy_production 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="key=staging.terraform.tfstate"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file="env/staging.tfvars"

  destroy_development:
    name: 'Destroy Development'
    runs-on: ubuntu-latest
    needs: destroy_staging 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="key=dev.terraform.tfstate"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file="env/dev.tfvars"
